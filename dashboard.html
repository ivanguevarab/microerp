<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MicroERP - Dashboard V2</title> 
  
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Config para usar nuestra tipografía primaria como principal -->
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], } } } }
  </script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css"> <!-- Vinculado a nuestro nuevo CSS unificado Premium -->
  
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="auth-guard.js"></script> <!-- Funcionalidad Restablecida de Regla de Oro -->
</head>

<body class="bg-slate-950 text-slate-200">
  
  <!-- Header: Rediseñado usando los estandares de styles.css unificado (submodule-header) -->
  <header class="submodule-header">
    <div class="submodule-header-content">
      <h1 class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-amber-600">Centro de Mando</h1>
      
      <div class="submodule-version">Micro ERP Core</div>
      
      <div class="flex items-center gap-6 ml-4">
        <!-- Contenedor del Usuario Glassmorphism -->
        <div class="hidden sm:flex items-center gap-4 bg-slate-900/80 px-5 py-2 rounded-full border border-slate-800 shadow-inner backdrop-blur-xl">
          <img id="userAvatarImg" class="w-8 h-8 rounded-full border border-slate-700 object-cover" src="" alt="User" style="display: none;" onerror="this.onerror=null; this.style.display='none'; document.getElementById('userAvatarDiv').style.display='flex';">
          <div id="userAvatarDiv" class="w-8 h-8 rounded-full border border-slate-700 bg-slate-800 text-amber-500 flex items-center justify-center font-bold text-xs">U</div>
          
          <div class="flex flex-col pr-2">
            <span class="text-slate-200 text-[13px] font-bold leading-tight" id="userName">Cargando...</span>
            <span class="text-slate-500 text-[10px] uppercase tracking-widest" id="userRole">...</span>
          </div>
        </div>
        
        <button class="btn-back-std" onclick="logout()">
           <i class="fa-solid fa-right-from-bracket"></i> Salir
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-[1400px] mx-auto px-6 py-10 pt-12">
    
    <!-- Welcome Section -->
    <section class="mb-12">
      <h2 id="welcomeMessage" class="text-2xl font-bold text-white tracking-tight mb-2">Bienvenido al Dashboard</h2>
      <p class="text-slate-400 text-sm lg:text-base tracking-wide">Accede a los módulos según tus permisos de usuario matriz</p>
    </section>

    <!-- Stats Section Rediseñada (SaaS Monocromática Premium) -->
    <section class="mb-14">
      <h3 class="text-slate-300 text-xl font-bold tracking-tight mb-5 flex items-center gap-3">
         <i class="fa-solid fa-chart-pie text-amber-500"></i>
         Resumen General
      </h3>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        
        <!-- Tarjeta 1: Inventario -->
        <div class="bg-slate-900/40 backdrop-blur-md rounded-2xl p-6 border border-slate-800/80 hover:border-slate-600 transition-all duration-300 relative overflow-hidden group hover:bg-slate-900/80 flex items-center gap-5 shadow-xl">
          <div class="absolute -right-6 -top-6 w-24 h-24 bg-amber-500/5 rounded-full blur-2xl group-hover:bg-amber-500/10 transition-all"></div>
          <div class="w-14 h-14 shrink-0 rounded-xl flex items-center justify-center text-2xl bg-slate-950 border border-slate-800 shadow-inner group-hover:border-slate-600 transition-colors text-slate-400 group-hover:text-amber-500">
            <i class="fa-solid fa-boxes-stacked"></i>
          </div>
          <div class="flex flex-col relative z-10 w-full min-w-0">
            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 truncate">Total Inventario</h4>
            <div class="text-2xl font-bold text-slate-200 truncate">S/ 98,756</div>
          </div>
        </div>
        
        <!-- Tarjeta 2: Ventas -->
        <div class="bg-slate-900/40 backdrop-blur-md rounded-2xl p-6 border border-slate-800/80 hover:border-slate-600 transition-all duration-300 relative overflow-hidden group hover:bg-slate-900/80 flex items-center gap-5 shadow-xl">
          <div class="absolute -right-6 -top-6 w-24 h-24 bg-amber-500/5 rounded-full blur-2xl group-hover:bg-amber-500/10 transition-all"></div>
          <div class="w-14 h-14 shrink-0 rounded-xl flex items-center justify-center text-2xl bg-slate-950 border border-slate-800 shadow-inner group-hover:border-slate-600 transition-colors text-slate-400 group-hover:text-amber-500">
            <i class="fa-solid fa-sack-dollar"></i>
          </div>
          <div class="flex flex-col relative z-10 w-full min-w-0">
            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 truncate">Ventas del Mes</h4>
            <div class="text-2xl font-bold text-slate-200 truncate">S/ 45,780</div>
          </div>
        </div>

        <!-- Tarjeta 3: Produccion -->
        <div class="bg-slate-900/40 backdrop-blur-md rounded-2xl p-6 border border-slate-800/80 hover:border-slate-600 transition-all duration-300 relative overflow-hidden group hover:bg-slate-900/80 flex items-center gap-5 shadow-xl">
          <div class="absolute -right-6 -top-6 w-24 h-24 bg-amber-500/5 rounded-full blur-2xl group-hover:bg-amber-500/10 transition-all"></div>
          <div class="w-14 h-14 shrink-0 rounded-xl flex items-center justify-center text-2xl bg-slate-950 border border-slate-800 shadow-inner group-hover:border-slate-600 transition-colors text-slate-400 group-hover:text-amber-500">
            <i class="fa-solid fa-industry"></i>
          </div>
          <div class="flex flex-col relative z-10 w-full min-w-0">
            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 truncate">Órdenes (Prod)</h4>
            <div class="text-2xl font-bold text-slate-200 truncate">23</div>
          </div>
        </div>

        <!-- Tarjeta 4: CRM -->
        <div class="bg-slate-900/40 backdrop-blur-md rounded-2xl p-6 border border-slate-800/80 hover:border-slate-600 transition-all duration-300 relative overflow-hidden group hover:bg-slate-900/80 flex items-center gap-5 shadow-xl">
          <div class="absolute -right-6 -top-6 w-24 h-24 bg-amber-500/5 rounded-full blur-2xl group-hover:bg-amber-500/10 transition-all"></div>
          <div class="w-14 h-14 shrink-0 rounded-xl flex items-center justify-center text-2xl bg-slate-950 border border-slate-800 shadow-inner group-hover:border-slate-600 transition-colors text-slate-400 group-hover:text-amber-500">
            <i class="fa-solid fa-handshake"></i>
          </div>
          <div class="flex flex-col relative z-10 w-full min-w-0">
            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 truncate">Clientes Activos</h4>
            <div class="text-2xl font-bold text-slate-200 truncate">156</div>
          </div>
        </div>

      </div>
    </section>

    <!-- Modules Section -->
    <section>
      <h3 class="text-slate-300 text-xl font-bold tracking-tight mb-5 flex items-center gap-3">
         <i class="fa-solid fa-layer-group text-amber-500"></i>
         Módulos del Sistema
      </h3>
      <!-- grid container for modules. Changed ID from id="modulesGrid" logic is intact -->
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="modulesGrid">
        <!-- Los módulos se cargarán dinámicamente aquí -->
      </div>
    </section>
  </main>

  <script>
    // ============================================
    // DEFINICIÓN DE MÓDULOS Y PERMISOS
    // ============================================

    const MODULES = [
      {
        id: 'compras',
        icon: '<i class="fa-solid fa-sack-dollar"></i>', // Emojis pasados a FontAwesome corporativo
        title: 'Ventas',
        description: 'Control de ventas, cotizaciones en tiempo real y facturación electrónica',
        url: 'ventas_y_facturacion.html',
        permissions: {
          'ADMIN': ['ver', 'editar', 'eliminar'],
          'LOGISTICA': ['ver', 'editar'],
          'VENTAS': ['ver'],
          'LECTURA': ['ver']
        }
      },
      {
        id: 'inventarios',
        icon: '<i class="fa-solid fa-boxes-stacked"></i>',
        title: 'Control de Inventarios',
        description: 'Gestiona tu stock en tiempo real con alertas automáticas y control de lotes',
        url: 'gestion_inventarios.html',
        permissions: {
          'ADMIN': ['ver', 'editar', 'eliminar'],
          'LOGISTICA': ['ver', 'editar', 'eliminar'],
          'VENTAS': ['ver'],
          'LECTURA': ['ver']
        }
      },
      {
        id: 'ventas',
        icon: '<i class="fa-solid fa-handshake"></i>', 
        title: 'Gestión de Relaciones con Clientes (CRM)',
        description: 'Gestión y fidelización de cartera de Clientes',
        url: 'gestion_crm.html',
        permissions: {
          'ADMIN': ['ver', 'editar', 'eliminar'],
          'LOGISTICA': [],
          'VENTAS': ['ver', 'editar'],
          'LECTURA': ['ver']
        }
      },
      {
        id: 'produccion',
        icon: '<i class="fa-solid fa-industry"></i>',
        title: 'Gestión de Producción y Servicios',
        description: 'Control de órdenes, trazabilidad y etiquetado',
        url: 'gestion_produccion_y_servicios.html',
        permissions: {
          'ADMIN': ['ver', 'editar', 'eliminar'],
          'LOGISTICA': ['ver', 'editar'],
          'VENTAS': ['ver'],
          'LECTURA': ['ver']
        }
      },
      {
        id: 'personal',
        icon: '<i class="fa-solid fa-users-viewfinder"></i>',
        title: 'Gestión de Personal',
        description: 'Padrón, control de tiempos, banco de horas y liquidaciones mensuales',
        url: 'gestion_de_personal.html',
        permissions: {
          'ADMIN': ['ver', 'editar', 'eliminar'],
          'LOGISTICA': ['ver'],
          'VENTAS': ['ver'],
          'LECTURA': ['ver']
        }
      },
      {
        id: 'finanzas',
        icon: '<i class="fa-solid fa-chart-line"></i>',
        title: 'Análisis Financiero',
        description: 'Reportes detallados, control total de finanzas y análisis de rentabilidad',
        url: 'finanzas.html',
        permissions: {
          'ADMIN': ['ver', 'editar'],
          'LOGISTICA': [],
          'VENTAS': [],
          'LECTURA': ['ver']
        }
      }
    ];

    // ============================================
    // RENDERIZADO DE MÓDULOS
    // ============================================

    function renderModules(userData) {
      const modulesGrid = document.getElementById('modulesGrid');
      modulesGrid.innerHTML = '';

      const userRole = userData.role || 'LECTURA';
      const userRoutes = userData.userRoutes || [];
      const isAdmin = userRole === 'ADMIN';

      MODULES.forEach(module => {
        // Regla de Negocio: Ocultar Producción si es estrictamente Comercial
        if (module.id === 'produccion' && userData.isOnlyCommercial) {
          return;
        }

        let hasAccess = false;
        if (isAdmin) {
          hasAccess = true;
        } else {
          // Buscamos si el usuario tiene permiso a por lo menos una sub-página de este macromódulo
          const sidebarConfig = (window.MicroErpMenuConfig || []).find(m => m.url === module.url);
          if (sidebarConfig && sidebarConfig.type === 'accordion') {
            hasAccess = sidebarConfig.groups.some(g => g.items.some(i => userRoutes.includes(i.url)));
          } else if (sidebarConfig && sidebarConfig.type === 'link') {
            hasAccess = userRoutes.includes(sidebarConfig.url);
          } else {
            // Fallback
            hasAccess = false;
          }
        }

        const moduleCard = document.createElement('div');
        moduleCard.className = `bg-slate-900/50 backdrop-blur-xl rounded-[1.25rem] p-[1.5rem] transition-all duration-300 border border-slate-800 relative overflow-hidden group cursor-pointer h-full flex flex-col justify-between ${!hasAccess ? 'opacity-40 grayscale cursor-not-allowed pointer-events-none hover:border-slate-800 shadow-none' : 'hover:-translate-y-2 hover:border-amber-500/40 shadow-xl hover:shadow-[0_15px_30px_rgba(245,158,11,0.15)] hover:bg-slate-900/80'}`;

        if (hasAccess) {
          moduleCard.onclick = () => navigateToModule(module.url);
        }

        moduleCard.innerHTML = `
          <!-- Indicador lateral glowing -->
          <div class="absolute inset-y-0 left-0 w-1 bg-gradient-to-b from-transparent via-slate-800 to-transparent group-hover:via-amber-500 transition-colors duration-500 ${!hasAccess ? 'hidden' : ''}"></div>
          
          <div class="relative z-10 h-full flex flex-col pt-1">
            <div class="flex items-center gap-4 mb-4">
              <div class="w-12 h-12 shrink-0 rounded-xl bg-slate-950 flex items-center justify-center text-[1.4rem] border border-slate-800 shadow-inner group-hover:border-amber-500/30 group-hover:text-amber-500 transition-all text-slate-400">
                  ${module.icon}
              </div>
              <div class="text-lg font-bold text-slate-200 group-hover:text-white transition-colors leading-tight flex-1 ml-1">${module.title}</div>
            </div>
            
            <div class="text-slate-500 text-sm leading-relaxed mb-6 font-medium flex-grow">
               ${module.description}
            </div>
            
            <div class="pt-4 border-t border-slate-800/80 flex justify-between items-center text-[10px] font-bold text-slate-600 uppercase tracking-widest ${!hasAccess ? 'hidden' : 'group-hover:text-amber-500/90 transition-colors'}">
               <span>Acceder al Módulo</span>
               <i class="fa-solid fa-arrow-right-long group-hover:translate-x-1 transition-transform"></i>
            </div>
            
            ${!hasAccess ? '<div class="pt-4 border-t border-slate-800/80 flex justify-between items-center text-[10px] font-bold text-red-500 opacity-60 uppercase tracking-widest"><span>Acceso Restringido</span><i class="fa-solid fa-lock"></i></div>' : ''}
          </div>
        `;

        modulesGrid.appendChild(moduleCard);
      });
    }

    function navigateToModule(url) {
      if (url === 'ventas_y_facturacion.html' || url === 'gestion_inventarios.html' || url === 'gestion_produccion_y_servicios.html' || url === 'gestion_crm.html' || url === 'gestion_de_personal.html' || url === 'calendario_esperado_de_trabajadores.html' || url === 'finanzas.html') {
        window.location.href = url;
      } else {
        alert(`Módulo en desarrollo. Próximamente se cargará: ${url}`);
      }
    }

    async function logout() {
      if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
        if (window.supabaseClient) await window.supabaseClient.auth.signOut();
        localStorage.removeItem('microerp_session'); // Legacy clean
        window.location.href = 'index.html';
      }
    }

    // ============================================
    // INICIALIZACIÓN
    // ============================================

    window.addEventListener('load', () => {
      // Auth Guard ya ha verificado la sesión para este punto o está en proceso.
      // Esperamos asegurar que window.currentUser existe.
      const checkGuard = setInterval(() => {
        if (window.currentUser) {
          clearInterval(checkGuard);
          initDashboard(window.currentUser);
        }
      }, 100);
    });

    async function initDashboard(user) {
      // 1. Datos básicos desde Auth (Google)
      const userData = {
        name: user.user_metadata.full_name || user.email,
        email: user.email,
        picture: user.user_metadata.avatar_url || '',
        role: 'Cargando...', 
        company: 'Conectando...' 
      };

      // 2. Renderizar UI Inicial
      renderHeader(userData);
      document.getElementById('welcomeMessage').textContent = `Bienvenido(a), ${userData.name}`;

      try {
        const { data: profile, error } = await window.supabaseClient
          .from('perfiles_usuario')
          .select(`
            rol,
            accesos_rutas,
            empresas (
              nombre,
              plan_suscripcion,
              es_comercializadora,
              es_servicios,
              es_industrial
            )
          `)
          .eq('id', user.id)
          .single();

        if (error) throw error;

        if (profile) {
          userData.role = profile.rol;
          userData.userRoutes = profile.accesos_rutas || [];

          if (profile.empresas) {
            userData.company = profile.empresas.nombre;
            userData.isOnlyCommercial = (
              profile.empresas.es_comercializadora === true &&
              profile.empresas.es_servicios === false &&
              profile.empresas.es_industrial === false
            );
          } else {
            userData.company = 'Sin Empresa';
            userData.isOnlyCommercial = false; 
          }

          updateHeaderInfo(userData);
          renderModules(userData);

          if (userData.isOnlyCommercial) {
            const sidebarProd = document.getElementById('menu-produccion');
            if (sidebarProd) {
              const liParent = sidebarProd.closest('li.nav-section');
              if (liParent) {
                liParent.style.display = 'none';
              }
            }
          }
          console.log('✅ Perfil Empresa cargado:', userData.company, userData.role, '| Exclusivo Comercial:', userData.isOnlyCommercial);
        }
      } catch (err) {
        console.error('Error cargando perfil extendido:', err);
        userData.role = 'Error';
        userData.company = 'Sin Conexión';
        updateHeaderInfo(userData);
      }
    }

    function renderHeader(userData) {
      const avatarImg = document.getElementById('userAvatarImg');
      const avatarDiv = document.getElementById('userAvatarDiv');

      if (userData.picture) {
        avatarImg.src = userData.picture;
        avatarImg.style.display = 'block';
        avatarDiv.style.display = 'none';
      } else {
        avatarImg.style.display = 'none';
        avatarDiv.style.display = 'flex';
        avatarDiv.textContent = (userData.name || 'U').charAt(0).toUpperCase();
      }
      updateHeaderInfo(userData);
    }

    function updateHeaderInfo(userData) {
      document.getElementById('userName').textContent = userData.name;
      const roleDisplay = userData.company
        ? `${userData.company} (${userData.role})`
        : userData.role;
      document.getElementById('userRole').textContent = roleDisplay;
    }
  </script>
  <!-- Inyectar Sidebar Original -->
  <script src="sidebar.js"></script>
</body>

</html>
