<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arqueo de caja</title>
    <!-- Tailwind CSS (CDN for standalone) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617; /* Slate 950 */
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism utils */
        .glass-panel {
            background-color: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5);
        }

        .ambient-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }
        .blob-1 { top: -10%; left: -20%; width: 70vw; height: 70vw; background: rgba(37, 99, 235, 0.15); }
        .blob-2 { bottom: -10%; right: -20%; width: 60vw; height: 60vw; background: rgba(245, 158, 11, 0.10); }

        /* Inputs */
        input[type="text"], input[type="number"], input[type="tel"] {
            background-color: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #f8fafc;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #f59e0b; /* Amber */
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
        }

        /* Number Inputs hiding spinners */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .calc-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .calc-row:last-child {
            border-bottom: none;
        }
        
        .val-badge {
            width: 35px;
            text-align: right;
            font-weight: 700;
            font-size: 13px;
            margin-right: 12px;
        }
        .val-billete { color: #94a3b8; }
        .val-moneda { color: #fcd34d; }
        .val-centimo { color: #9ca3af; }

        .qty-input-wrap {
            display: flex;
            align-items: center;
        }
        .qty-calc {
            width: 45px;
            text-align: center;
            padding: 4px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
        }
        .subtotal-val {
            flex: 1;
            text-align: right;
            font-weight: 700;
            color: #e2e8f0;
            font-size: 12px;
            min-width: 50px;
        }
        
        /* Modal Overlay */
        #welcome-modal {
            background-color: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden flex flex-col">

    <!-- Ambient Background -->
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>

    <!-- WELCOME MODAL -->
    <div id="welcome-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="glass-panel rounded-2xl w-full max-w-sm p-6 transform transition-all">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-500/20 text-blue-400 mb-4">
                    <i class="fas fa-cash-register text-3xl"></i>
                </div>
                <h2 class="text-xl font-bold text-white mb-1" id="modal-empresa-nombre">Cargando...</h2>
                <p class="text-slate-400 text-sm">Arqueo de caja</p>
            </div>
            
            <form id="setup-form" onsubmit="event.preventDefault(); startCalculator();" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Nombre de la Cajera(o)</label>
                    <input type="text" id="in-cajera" required class="w-full rounded-lg px-4 py-3 text-lg" placeholder="Ej. María Pérez" autocomplete="off">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Número de Caja</label>
                    <input type="tel" id="in-caja" required class="w-full rounded-lg px-4 py-3 text-lg" placeholder="Ej. 1" autocomplete="off">
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 px-4 rounded-xl transition duration-200 shadow-lg shadow-blue-500/30 flex justify-center items-center gap-2">
                        <span>Comenzar Conteo</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- MAIN CALCULATOR (Hidden initially) -->
    <main id="main-app" class="hidden flex-1 flex flex-col max-w-lg mx-auto w-full pb-28">
        
        <!-- HEADER (Optimized for screenshot) -->
        <header id="capture-header" class="glass-panel p-5 m-3 rounded-2xl relative overflow-hidden">
            <!-- Decorative gradient line at top -->
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-500 via-amber-400 to-blue-500"></div>
            
            <div class="text-center mb-4">
                <h1 class="text-xl font-extrabold text-white tracking-tight" id="ui-empresa">Empresa</h1>
                <p class="text-amber-400 text-xs font-bold uppercase tracking-widest mt-1">Conteo Físico de Gaveta</p>
            </div>
            
            <div class="flex justify-between items-center bg-slate-900/50 rounded-xl p-3 border border-slate-700/50">
                <div>
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-0.5">Cajera(o)</p>
                    <p class="text-sm font-bold text-white" id="ui-cajera-name">Usuario</p>
                </div>
                <div class="w-px h-8 bg-slate-700"></div>
                <div>
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-0.5 text-right">Caja</p>
                    <p class="text-sm font-bold text-white text-right" id="ui-caja-num">#0</p>
                </div>
            </div>
            
            <div class="mt-3 text-center">
                <p class="text-xs text-slate-400 font-medium" id="ui-datetime">
                    <i class="far fa-clock mr-1"></i> Calculando...
                </p>
            </div>
        </header>

        <!-- CALCULATOR BODY -->
        <div class="px-3 flex-1 flex flex-col">
            <div class="grid grid-cols-2 gap-2 mb-3">
                
                <!-- BILLETES -->
                <div class="glass-panel rounded-2xl p-2 flex flex-col">
                    <div class="flex items-center gap-1.5 mb-2 pb-2 border-b border-slate-700/50">
                        <i class="fas fa-money-bill-wave text-blue-400 text-xs"></i>
                        <h3 class="font-bold text-blue-100 uppercase tracking-widest text-[10px]">Billetes</h3>
                        <div class="ml-auto text-[10px] font-bold text-blue-300 truncate leading-relaxed pb-0.5" id="sub-billetes">S/ 0.00</div>
                    </div>
                    
                    <div class="calc-row">
                        <div class="val-badge val-billete">200</div>
                        <div class="qty-input-wrap">
                            <input type="tel" class="qty-calc" data-val="200" placeholder="0" oninput="maskQty(this)">
                        </div>
                        <div class="subtotal-val">0.00</div>
                    </div>
                    <div class="calc-row">
                        <div class="val-badge val-billete">100</div>
                        <div class="qty-input-wrap">
                            <input type="tel" class="qty-calc" data-val="100" placeholder="0" oninput="maskQty(this)">
                        </div>
                        <div class="subtotal-val">0.00</div>
                    </div>
                    <div class="calc-row">
                        <div class="val-badge val-billete">50</div>
                        <div class="qty-input-wrap">
                            <input type="tel" class="qty-calc" data-val="50" placeholder="0" oninput="maskQty(this)">
                        </div>
                        <div class="subtotal-val">0.00</div>
                    </div>
                    <div class="calc-row">
                        <div class="val-badge val-billete">20</div>
                        <div class="qty-input-wrap">
                            <input type="tel" class="qty-calc" data-val="20" placeholder="0" oninput="maskQty(this)">
                        </div>
                        <div class="subtotal-val">0.00</div>
                    </div>
                    <div class="calc-row">
                        <div class="val-badge val-billete">10</div>
                        <div class="qty-input-wrap">
                            <input type="tel" class="qty-calc" data-val="10" placeholder="0" oninput="maskQty(this)">
                        </div>
                        <div class="subtotal-val">0.00</div>
                    </div>
                </div>

                <!-- MONEDAS -->
                <div class="glass-panel rounded-2xl p-2 flex flex-col">
                    <div class="flex items-center gap-1.5 mb-2 pb-2 border-b border-slate-700/50">
                        <i class="fas fa-coins text-amber-400 text-xs"></i>
                        <h3 class="font-bold text-amber-100 uppercase tracking-widest text-[10px]">Monedas</h3>
                        <div class="ml-auto text-[10px] font-bold text-amber-300 truncate leading-relaxed pb-0.5" id="sub-monedas">S/ 0.00</div>
                    </div>
                    
                    <div class="calc-row">
                        <div class="val-badge val-moneda">5.00</div>
                        <div class="qty-input-wrap">
                            <input type="tel" class="qty-calc" data-val="5" placeholder="0" oninput="maskQty(this)">
                        </div>
                        <div class="subtotal-val">0.00</div>
                    </div>
                    <div class="calc-row">
                        <div class="val-badge val-moneda">2.00</div>
                        <div class="qty-input-wrap">
                            <input type="tel" class="qty-calc" data-val="2" placeholder="0" oninput="maskQty(this)">
                        </div>
                        <div class="subtotal-val">0.00</div>
                    </div>
                    <div class="calc-row">
                        <div class="val-badge val-moneda">1.00</div>
                        <div class="qty-input-wrap">
                            <input type="tel" class="qty-calc" data-val="1" placeholder="0" oninput="maskQty(this)">
                        </div>
                        <div class="subtotal-val">0.00</div>
                    </div>
                    <div class="calc-row">
                        <div class="val-badge val-centimo">0.50</div>
                        <div class="qty-input-wrap">
                            <input type="tel" class="qty-calc" data-val="0.5" placeholder="0" oninput="maskQty(this)">
                        </div>
                        <div class="subtotal-val">0.00</div>
                    </div>
                    <div class="calc-row">
                        <div class="val-badge val-centimo">0.20</div>
                        <div class="qty-input-wrap">
                            <input type="tel" class="qty-calc" data-val="0.2" placeholder="0" oninput="maskQty(this)">
                        </div>
                        <div class="subtotal-val">0.00</div>
                    </div>
                    <div class="calc-row">
                        <div class="val-badge val-centimo">0.10</div>
                        <div class="qty-input-wrap">
                            <input type="tel" class="qty-calc" data-val="0.1" placeholder="0" oninput="maskQty(this)">
                        </div>
                        <div class="subtotal-val">0.00</div>
                    </div>
                </div>
            </div>

            <!-- Botón de Captura -->
            <button data-html2canvas-ignore="true" onclick="tomarCaptura()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 px-4 rounded-xl transition duration-200 shadow-lg shadow-blue-500/30 flex justify-center items-center gap-2 mt-2">
                <i class="fas fa-camera"></i>
                <span>Tomar Captura y Guardar</span>
            </button>
        </div>
    </main>

    <!-- STICKY BOTTOM BAR -->
    <div id="sticky-bottom" class="fixed bottom-0 left-0 right-0 p-4 transform translate-y-full transition-transform duration-300 z-40 hidden">
        <div class="max-w-lg mx-auto w-full">
            <div class="bg-gradient-to-r from-blue-700 to-blue-500 rounded-2xl shadow-[0_-5px_20px_rgba(37,99,235,0.3)] pt-3 pb-5 px-4 flex flex-col items-center justify-center relative border border-blue-400/30">
                <p class="text-white text-4xl font-black tracking-tight leading-normal pb-1" id="ui-total-efectivo">S/ 0.00</p>
                <p class="text-blue-100 text-xs font-bold uppercase tracking-wider mt-1">Total Efectivo</p>
                
                <button onclick="limpiarTodo()" class="absolute right-4 bg-blue-900/40 hover:bg-blue-900/60 text-white rounded-xl p-3 transition">
                    <i class="fas fa-eraser text-lg"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        let clockInterval;
        let empresaNombreGlobal = "Negocio";

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            let emp = params.get('empresa');
            if (emp) {
                empresaNombreGlobal = emp;
                document.getElementById('modal-empresa-nombre').textContent = emp;
                document.getElementById('ui-empresa').textContent = emp;
            } else {
                document.getElementById('modal-empresa-nombre').textContent = "MicroERP Cloud";
                document.getElementById('ui-empresa').textContent = "MicroERP Cloud";
            }
        }

        function updateClock() {
            const fechaLima = new Intl.DateTimeFormat('es-PE', { 
                timeZone: 'America/Lima', 
                day: '2-digit', month: 'short', year: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: true
            }).format(new Date());
            
            document.getElementById('ui-datetime').innerHTML = `<i class="far fa-clock mr-1"></i> ${fechaLima}`;
        }

        function startCalculator() {
            const cajera = document.getElementById('in-cajera').value.trim();
            const caja = document.getElementById('in-caja').value.trim();
            
            if (!cajera || !caja) return;

            // Set Data
            document.getElementById('ui-cajera-name').textContent = cajera;
            document.getElementById('ui-caja-num').textContent = `Caja ${caja}`;

            // Start Clock
            updateClock();
            clockInterval = setInterval(updateClock, 1000);

            // UI Transitions
            document.getElementById('welcome-modal').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                document.getElementById('welcome-modal').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                const stickyBar = document.getElementById('sticky-bottom');
                stickyBar.classList.remove('hidden');
                // Allow a tiny delay for browser to render block before animating translation
                setTimeout(() => {
                    stickyBar.classList.remove('translate-y-full');
                }, 50);
            }, 300);
        }

        function maskQty(input) {
            // Permitir solo números enteros, si está vacío se maneja como 0 en cálculo
            input.value = input.value.replace(/[^0-9]/g, '');
            recalcularTodo();
        }

        function formatMoney(amount) {
            return Number(amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function recalcularTodo() {
            let sumFisico = 0;
            let sumBilletes = 0;
            let sumMonedas = 0;

            document.querySelectorAll('.qty-calc').forEach(inp => {
                let vInt = parseInt(inp.value) || 0;
                let valMap = parseFloat(inp.getAttribute('data-val'));
                let prod = vInt * valMap;
                
                inp.parentElement.nextElementSibling.textContent = formatMoney(prod);
                sumFisico += prod;

                if (valMap >= 10) {
                    sumBilletes += prod;
                } else {
                    sumMonedas += prod;
                }
            });

            document.getElementById('sub-billetes').textContent = `S/ ${formatMoney(sumBilletes)}`;
            document.getElementById('sub-monedas').textContent = `S/ ${formatMoney(sumMonedas)}`;
            document.getElementById('ui-total-efectivo').textContent = `S/ ${formatMoney(sumFisico)}`;
        }

        function limpiarTodo() {
            if(confirm('¿Estás seguro de reiniciar todas las cantidades a cero?')) {
                document.querySelectorAll('.qty-calc').forEach(inp => {
                    inp.value = '';
                });
                recalcularTodo();
            }
        }

        function tomarCaptura() {
            // 1. Reseteo de scroll al tope para evitar cálculos erróneos en la captura
            window.scrollTo(0, 0);

            const mainApp = document.getElementById('main-app');
            const stickyBottom = document.getElementById('sticky-bottom');
            
            // 2. Clonar el contenedor del total para añadirlo a la imagen
            const totalContent = stickyBottom.querySelector('.max-w-lg').cloneNode(true);
            const btnLimpiar = totalContent.querySelector('button');
            if(btnLimpiar) btnLimpiar.remove();
            totalContent.className = "w-full mt-0 pb-8 px-3"; 
            mainApp.appendChild(totalContent);

            // 3. Transformación temporal de los inputs a DIVs para evitar recorte
            const inputs = mainApp.querySelectorAll('input.qty-calc');
            const replacements = [];
            inputs.forEach(inp => {
                const div = document.createElement('div');
                div.className = inp.className + " flex items-center justify-center";
                div.textContent = inp.value || "0";
                div.style.backgroundColor = "rgba(30, 41, 59, 0.6)";
                div.style.border = "1px solid rgba(255, 255, 255, 0.15)";
                div.style.color = "#f8fafc";
                div.style.height = inp.offsetHeight + "px"; // forzar la misma altura
                
                inp.parentNode.insertBefore(div, inp);
                inp.style.display = 'none';
                replacements.push({ input: inp, div: div });
            });
            
            // 4. Captura
            html2canvas(mainApp, {
                backgroundColor: '#020617',
                scale: 2,
                scrollY: -window.scrollY // Forzar canvas align top
            }).then(canvas => {
                // Restaurar inputs
                replacements.forEach(rep => {
                    rep.input.style.display = '';
                    rep.div.remove();
                });
                
                // Remover el total temporal
                totalContent.remove();
                
                // Formatear la fecha
                const fecha = new Date();
                const dia = fecha.getDate().toString().padStart(2, '0');
                const mes = (fecha.getMonth() + 1).toString().padStart(2, '0');
                const ano = fecha.getFullYear();
                const strFecha = `${dia}-${mes}-${ano}`;
                
                const filename = `ARQUEO_${strFecha}.png`;
                
                const link = document.createElement('a');
                link.download = filename;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            getUrlParams();
            
            // Add event listeners to input fields to autoselect content on focus for rapid entry
            document.querySelectorAll('.qty-calc').forEach(inp => {
                inp.addEventListener('focus', function() {
                    this.select();
                });
            });
        });
    </script>
</body>
</html>
