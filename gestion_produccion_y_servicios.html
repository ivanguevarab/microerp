<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroERP - Gestión de Producción y Servicios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css"> <!-- Estilos Globales -->
    <!-- Auth Guard -->
    <script src="auth-guard.js"></script>
    <style>
        /* Estilos Locales (Resets globales delegados a styles.css) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6fa;
            /* mix-height manejado por styles.css */
        }

        /* Header Adaptado a Sidebar (Replicado de gestion_inventarios.html) */
        .header {
            background: var(--header-bg-gradient);
            color: var(--header-text-color);
            height: 80px;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--header-shadow);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header h1 {
            font-size: 24px;
            letter-spacing: 1px;
        }

        /* Container */
        .container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            border-color: #0070f2;
        }

        .card-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .card h3 {
            color: #354a5f;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: 600;
        }

        .card p {
            color: #7f8c8d;
            font-size: 14px;
            line-height: 1.4;
        }

        /* Disabled Card Style */
        .card.disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background-color: #f8fafc;
        }

        .card.disabled:hover {
            transform: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-color: transparent;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .header {
                position: relative;
                padding: 15px;
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .header-left {
                width: 100%;
                justify-content: space-between;
            }

            .header h1 {
                font-size: 18px;
            }

            .btn-text-desktop {
                display: none;
            }

            .btn-text-mobile {
                display: inline;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <button class="btn-back-std" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-arrow-left"></i>
                <span class="btn-text-desktop">Volver al Dashboard</span>
                <span class="btn-text-mobile" style="display:none">Volver</span>
            </button>
            <h1 style="margin-left: 20px; font-size: 1.5rem; font-weight: 700;">Gestión de Producción y Servicios</h1>
        </div>
    </header>

    <main class="container">

        <h2 class="section-title">🏭 Operaciones de Producción</h2>
        <div class="grid">
            <!-- Tarjeta 1: CUP -->
            <div class="card" onclick="window.location.href='codigos_cup.html'">
                <div class="card-icon">🏭</div>
                <h3>Órdenes de Producción (CUP)</h3>
                <p>Control de órdenes, trazabilidad y etiquetado</p>
            </div>

            <!-- Tarjeta 2: CUS -->
            <div class="card" onclick="window.location.href='codigos_cus.html'">
                <div class="card-icon">🛠️</div>
                <h3>Órdenes de Servicio (CUS)</h3>
                <p>Gestión de servicios, trazabilidad y etiquetado</p>
            </div>
        </div>

    </main>

    <!-- Inyectar Sidebar -->
    <script src="sidebar.js"></script>
</body>

</html>
