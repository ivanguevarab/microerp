<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Ventas - MICRO ERP</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Supabase & Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-guard.js"></script>

    <link rel="stylesheet" href="styles.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .data-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .data-table th { background-color: #f8fafc; color: #475569; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; padding: 12px 16px; border-bottom: 2px solid #e2e8f0; text-align: left; }
        .data-table td { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; font-size: 0.875rem; color: #334155; background-color: white; }
        .data-table tbody tr:hover td { background-color: #f8fafc; }
        .status-badge { padding: 4px 8px; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .status-anulado { background-color: #fee2e2; color: #dc2626; }
        .status-registrado { background-color: #dcfce3; color: #16a34a; }
        
        .modal-details { max-width: 800px !important; text-align: left !important; }
        .detail-table { width: 100%; font-size: 13px; margin-top: 15px; }
        .detail-table th { background: #f1f5f9; padding: 8px; text-align: left; border-bottom: 1px solid #cbd5e1; }
        .detail-table td { padding: 8px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>

<body>
    <!-- Header Standarizado -->
    <header class="submodule-header">
        <div class="submodule-header-content">
            <button class="btn-back-std" onclick="window.location.href='ventas_y_facturacion.html'">
                ← Volver
            </button>
            <h1>Registros Históricos de Ventas</h1>
            <div class="submodule-version" id="fechaActual"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Panel de Filtros -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Buscar Ticket o Cliente</label>
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        <input type="text" id="filtroBuscador" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="N° Ticket, Nombre...">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Desde</label>
                    <input type="date" id="filtroFechaInc" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Hasta</label>
                    <input type="date" id="filtroFechaFin" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                </div>
            </div>
            <div class="flex justify-between items-end gap-4 mt-6">
                <div class="flex-1"></div>
                <button onclick="promptReimprimir()" class="bg-gray-700 hover:bg-gray-800 text-white font-bold py-2 px-6 rounded-lg transition-colors shadow flex items-center gap-2 mr-2">
                    <i class="fas fa-print"></i> Reimprimir por N°
                </button>
                <button onclick="cargarVentashistoricas()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-colors shadow flex items-center gap-2">
                    <i class="fas fa-filter"></i> Aplicar Filtros
                </button>
            </div>
        </div>

        <!-- Tabla Principal -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th width="12%">Fecha</th>
                            <th width="15%">N° Ticket</th>
                            <th width="25%">Cliente</th>
                            <th width="12%">Comprobante</th>
                            <th width="14%" class="text-right">Total (S/)</th>
                            <th width="12%" class="text-center">Estado</th>
                            <th width="10%" class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaVentas">
                        <!-- Las filas se inyectan acá -->
                    </tbody>
                </table>
            </div>
            
            <!-- Paginación Simple -->
            <div class="bg-gray-50 px-6 py-3 border-t border-gray-200 flex items-center justify-between">
                <p class="text-sm text-gray-700" id="paginacionInfo">Cargando...</p>
            </div>
        </div>
    </main>

    <script src="sidebar.js"></script>
    <script src="impresora_tickets.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            
            // Fechas por defecto (Mes actual)
            const hoy = new Date();
            document.getElementById('fechaActual').textContent = hoy.toLocaleDateString('es-PE');
            
            const primerDiaMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
            document.getElementById('filtroFechaInc').value = primerDiaMes.toISOString().split('T')[0];
            document.getElementById('filtroFechaFin').value = hoy.toISOString().split('T')[0];

            await cargarContextoInicial();

            // Leer parámetros URL para auto-filtros (Ej. desde cuentas por cobrar)
            const urlParams = new URLSearchParams(window.location.search);
            const searchParam = urlParams.get('search');
            if (searchParam) {
                document.getElementById('filtroBuscador').value = searchParam;
                document.getElementById('filtroFechaInc').value = '';
                document.getElementById('filtroFechaFin').value = '';
            }

            await cargarVentashistoricas();
        });

        let currentEmpresaId = null;

        async function cargarContextoInicial() {
            const { data: perfil } = await window.supabaseClient.from('perfiles_usuario').select('empresa_id').eq('id', window.currentUser.id).single();
            currentEmpresaId = perfil.empresa_id;
        }

        async function cargarVentashistoricas() {
            const term = document.getElementById('filtroBuscador').value.trim();
            const fecInc = document.getElementById('filtroFechaInc').value;
            const fecFin = document.getElementById('filtroFechaFin').value;
            
            const tbody = document.getElementById('tablaVentas');
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-500"><i class="fas fa-circle-notch fa-spin text-2xl mb-2 text-blue-500"></i><br>Consultando BD...</td></tr>';

            try {
                let query = window.supabaseClient.from('ventas')
                    .select(`
                        id, numero_ticket, fecha_venta, tipo_comprobante, genera_igv, precio_venta_total, condicion_pago, saldo_pendiente, estado, igv_debito_total, created_by,
                        clientes ( id, razon_social, numero_documento )
                    `)
                    .eq('empresa_id', currentEmpresaId)
                    .order('created_at', { ascending: false });

                if (fecInc) query = query.gte('fecha_venta', fecInc);
                if (fecFin) query = query.lte('fecha_venta', fecFin);

                const { data: ventas, error } = await query;
                if(error) throw error;

                // Filtrar localmente si hay término
                let filtrados = ventas || [];
                if(term) {
                    const t = term.toLowerCase();
                    filtrados = filtrados.filter(v => {
                        const c1 = (v.numero_ticket||'').toLowerCase().includes(t) ||
                        (v.clientes?.razon_social||'').toLowerCase().includes(t) ||
                        (v.clientes?.numero_documento||'').includes(t);
                        return c1;
                    });
                }

                renderTabla(filtrados);

                // Auto-apertura si viene en URL y encontró 1 solo resultado exacto
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('autoopen') === 'true' && filtrados.length === 1) {
                    setTimeout(() => { verDetalle(filtrados[0].id); }, 500);
                    // Limpiar url para que si recarga no se vuelva a abrir y quitar el parámetro visualmente
                    window.history.replaceState({}, document.title, window.location.pathname);
                }

            } catch (e) {
                console.error("Error cargas:", e);
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-red-500">Error al cargar datos.</td></tr>';
            }
        }

        function renderTabla(ventas) {
            const tbody = document.getElementById('tablaVentas');
            tbody.innerHTML = '';
            
            if(ventas.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-8 text-gray-500"><i class="fas fa-receipt text-4xl mb-3 text-gray-300"></i><p>No se encontraron ventas con estos filtros.</p></td></tr>`;
                document.getElementById('paginacionInfo').textContent = 'Mostrando 0 resultados';
                return;
            }

            document.getElementById('paginacionInfo').textContent = `Mostrando ${ventas.length} resultados`;

            ventas.forEach(v => {
                const isAnulado = v.estado === 'ANULADO';
                const textColorClass = isAnulado ? 'text-gray-400 line-through opacity-70' : '';
                
                const tr = document.createElement('tr');
                tr.className = isAnulado ? 'bg-gray-50' : '';
                
                tr.innerHTML = `
                    <td class="${textColorClass}">${new Date(v.fecha_venta).toLocaleDateString('es-PE')}</td>
                    <td class="font-bold text-blue-600 ${textColorClass}">${v.numero_ticket}</td>
                    <td class="${textColorClass}">
                        <div class="font-medium">${v.clientes ? v.clientes.razon_social : '<span class="italic text-gray-400">Cliente No Identificado (NN)</span>'}</div>
                        <div class="text-xs text-gray-500">${v.clientes ? v.clientes.numero_documento||'Sin Doc' : '---'}</div>
                    </td>
                    <td class="${textColorClass}">
                        ${v.tipo_comprobante} 
                        ${v.genera_igv ? '<span class="text-[10px] bg-blue-100 text-blue-800 px-1 rounded ml-1">IGV</span>' : ''}
                    </td>
                    <td class="text-right ${textColorClass}">
                        <div class="font-bold text-green-600">S/ ${formatMoney(v.precio_venta_total)}</div>
                        ${v.condicion_pago === 'CREDITO' ? `<div class="text-[10px] text-rose-500 font-bold mt-0.5" title="Saldo Pendiente de Crédito">Deuda: S/ ${formatMoney(v.saldo_pendiente||0)}</div>` : ''}
                    </td>
                    <td class="text-center ${textColorClass}">
                        <span class="status-badge ${isAnulado ? 'status-anulado' : 'status-registrado'}">${v.estado}</span>
                    </td>
                    <td class="text-center ${textColorClass}">
                        <div class="flex gap-2">
                            <button onclick="imprimirTicketCerrado('${v.id}')" class="text-gray-500 hover:text-gray-700 bg-gray-100 p-2 rounded-full shadow-sm" title="Imprimir Ticket">
                                <i class="fas fa-print"></i>
                            </button>
                            <button onclick="verDetalle('${v.id}')" class="text-blue-500 hover:text-blue-700 bg-blue-50 p-2 rounded-full shadow-sm" title="Ver Detalle">
                                <i class="fas fa-eye"></i>
                            </button>
                            ${v.estado !== 'ANULADO' ? `<button onclick="anularVenta('${v.id}')" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-full shadow-sm" title="Anular"><i class="fas fa-ban"></i></button>` : ''}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ==========================================
        //  MODAL DETALLES DE VENTA
        // ==========================================
        async function verDetalle(ventaId) {
            Swal.fire({ title: 'Cargando...', allowOutsideClick: false, didOpen:()=>{Swal.showLoading()} });
            
            try {
                // 1. Obtener cabecera
                const { data: v, error: ev } = await window.supabaseClient.from('ventas')
                    .select('*, clientes(razon_social, numero_documento)').eq('id', ventaId).single();
                if(ev) throw ev;
                // Detalles
                const { data: det } = await window.supabaseClient.from('ventas_detalle').select('*').eq('venta_id', ventaId);

                // Pagos de Crédito (Si Aplica)
                let pagosCredito = [];
                if(v.condicion_pago === 'CREDITO') {
                     const {data: pc} = await window.supabaseClient.from('ventas_credito_pagos').select('*').eq('venta_id', ventaId).order('fecha_pago', {ascending: true});
                     pagosCredito = pc || [];
                }

                // Resolver Nombres (Items vs CUS vs CUP)
                let detallesEnriquecidos = [];
                for(let d of det) {
                    let desc = 'Desconocido (Elemento Eliminado)';
                    let cod = '---';
                    if(d.tipo_item_vendido === 'ITEMS') {
                        if (d.referencia_id) {
                            const {data: item} = await window.supabaseClient.from('items').select('descripcion, codigo').eq('id', d.referencia_id).maybeSingle();
                            if(item) { desc = item.descripcion; cod = item.codigo; }
                        }
                    } else {
                        if (d.referencia_id) {
                            const {data: cus} = await window.supabaseClient.from('codigos_unicos').select('descripcion, codigo').eq('id', d.referencia_id).maybeSingle();
                            if(cus) { desc = cus.descripcion; cod = cus.codigo; }
                        }
                    }
                    detallesEnriquecidos.push({ ...d, descripcion: desc, codigo: cod });
                }

                // Armar HTML
                let rows = '';
                detallesEnriquecidos.forEach(d => {
                    rows += `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="p-3">
                                <div class="flex items-center gap-2">
                                    <span class="${d.tipo_item_vendido==='ITEMS'?'bg-emerald-100 text-emerald-700 border border-emerald-200':'bg-purple-100 text-purple-700 border border-purple-200'} px-2 py-0.5 rounded text-[10px] font-bold shadow-sm">${d.tipo_item_vendido}</span>
                                    <div>
                                        <p class="font-semibold text-gray-800 text-sm leading-tight">${d.descripcion}</p>
                                        <p class="text-[11px] text-gray-400 mt-0.5">${d.codigo}</p>
                                    </div>
                                </div>
                            </td>
                            <td class="text-center font-bold text-gray-700 p-3">${d.cantidad}</td>
                            <td class="text-right p-3">
                                <p class="text-gray-500 text-[11px] shadow-sm bg-gray-50 rounded px-2 py-1 inline-block border border-gray-100">S/ ${Number(d.valor_unitario).toFixed(2)} <span class="text-gray-400 font-light">+ Igv(S/ ${Number(d.igv_unitario).toFixed(2)})</span></p>
                            </td>
                            <td class="text-right font-medium text-gray-700 p-3 border-l border-gray-100">S/ ${formatMoney(d.precio_unitario)}</td>
                            <td class="text-right font-black text-blue-600 p-3 bg-blue-50/30">S/ ${formatMoney(d.precio_total)}</td>
                        </tr>
                    `;
                });

                let theHtml = `
                    <div class="mb-6 bg-white p-5 rounded-xl border border-gray-200 shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-gray-800 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg shadow-sm">RESUMEN COMERCIAL</div>
                        <div class="grid grid-cols-2 gap-y-4 gap-x-6 text-left">
                            <div>
                                <p class="text-[10px] uppercase text-gray-400 font-bold tracking-wider mb-1">N° Ticket</p>
                                <p class="font-bold text-blue-600 text-sm bg-blue-50 px-2 py-0.5 rounded inline-block border border-blue-100">${v.numero_ticket}</p>
                            </div>
                            <div>
                                <p class="text-[10px] uppercase text-gray-400 font-bold tracking-wider mb-1">Fecha Emisión</p>
                                <p class="font-medium text-gray-700 text-sm">${new Date(v.fecha_venta).toLocaleDateString('es-PE', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'})}</p>
                            </div>
                            <div class="col-span-2 border-t border-gray-100 pt-3">
                                <p class="text-[10px] uppercase text-gray-400 font-bold tracking-wider mb-1">Cliente Receptor</p>
                                <div class="flex items-center gap-3">
                                    <div class="bg-indigo-100 text-indigo-600 rounded-full h-8 w-8 flex items-center justify-center font-bold shadow-sm"><i class="fas fa-building"></i></div>
                                    <div>
                                        <p class="font-bold text-gray-800 text-sm">${v.clientes ? v.clientes.razon_social : 'NN'}</p>
                                        <p class="text-xs text-gray-500 mt-0.5"><i class="fas fa-id-card mr-1 text-gray-300"></i> ${v.clientes ? v.clientes.numero_documento||'' : '---'}</p>
                                    </div>
                                </div>
                            </div>
                            <div class="border-t border-gray-100 pt-3">
                                <p class="text-[10px] uppercase text-gray-400 font-bold tracking-wider mb-1">Comprobante</p>
                                <p class="font-medium text-gray-700 text-sm flex items-center"><i class="fas fa-file-invoice text-gray-300 mr-2"></i> ${v.tipo_comprobante}</p>
                            </div>
                            <div class="border-t border-gray-100 pt-3">
                                <p class="text-[10px] uppercase text-gray-400 font-bold tracking-wider mb-1">Estado</p>
                                <span class="px-2.5 py-1 text-[11px] rounded-full font-bold shadow-sm ${v.estado==='ANULADO'?'bg-red-50 text-red-600 border border-red-200':'bg-emerald-50 text-emerald-600 border border-emerald-200'}">${v.estado}</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gray-50 rounded-xl border border-gray-200 overflow-hidden mb-5 shadow-inner">
                        <div style="max-height: 280px; overflow-y: auto;">
                            <table class="detail-table w-full text-left">
                                <thead class="sticky top-0 bg-gray-100 shadow-sm z-10">
                                    <tr>
                                        <th width="45%" class="p-3 text-[10px] uppercase text-gray-500 tracking-wider font-bold">Concepto / Venta</th>
                                        <th width="8%" class="p-3 text-center text-[10px] uppercase text-gray-500 tracking-wider font-bold">Cant</th>
                                        <th width="20%" class="p-3 text-right text-[10px] uppercase text-gray-500 tracking-wider font-bold">Composición Unit.</th>
                                        <th width="12%" class="p-3 text-right text-[10px] uppercase text-gray-500 tracking-wider font-bold border-l border-gray-200">P. Venta U.</th>
                                        <th width="15%" class="p-3 text-right text-[10px] uppercase text-gray-500 tracking-wider font-bold">Subtotal</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-100">${rows}</tbody>
                            </table>
                        </div>
                    </div>

                    <div class="mt-4 pt-4 flex justify-end">
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-sm w-72 text-right">
                            <div class="flex justify-between items-center text-sm mb-2"><span class="text-gray-500 font-medium">Concepto Valorizado:</span> <span class="font-bold text-gray-700">S/ ${Number(v.valor_venta_total).toFixed(2)}</span></div>
                            <div class="flex justify-between items-center text-sm mb-3"><span class="text-gray-500 font-medium">IGV Impositivo (18%):</span> <span class="font-bold text-gray-700">S/ ${Number(v.igv_debito_total).toFixed(2)}</span></div>
                            <div class="flex justify-between items-center text-lg font-bold border-t border-gray-200 pt-3"><span class="text-gray-800">Costo Total:</span> <span class="text-blue-600">S/ ${Number(v.precio_venta_total).toFixed(2)}</span></div>
                        </div>
                    </div>
                `;

                // Agregar bloque dinámico de créditos al render
                if(v.condicion_pago === 'CREDITO') {
                    let rowsPagos = '';
                    pagosCredito.forEach(p => {
                        rowsPagos += `
                            <div class="flex justify-between items-center py-2 border-b border-gray-100 text-[13px]">
                                <div>
                                    <span class="font-bold text-gray-700">${p.tipo_pago}</span> 
                                    <span class="text-[10px] text-gray-500 ml-1 bg-gray-100 px-1 rounded">${p.metodo_pago}</span>
                                    <div class="text-[10px] text-gray-400">${new Date(p.fecha_pago).toLocaleString('es-PE')}</div>
                                </div>
                                <div class="font-bold text-emerald-600 border border-emerald-100 bg-emerald-50 px-2 py-0.5 rounded">S/ ${formatMoney(p.monto)}</div>
                            </div>
                        `;
                    });

                    theHtml += `
                        <div class="mt-5 bg-blue-50/40 border border-blue-200 rounded-lg p-4 shadow-sm relative">
                            <div class="absolute top-0 right-0 bg-blue-600 text-white text-[10px] font-bold px-2 py-1 rounded-bl-lg rounded-tr-lg">CRÉDITO</div>
                            <div class="flex justify-between items-center mb-4">
                                <div>
                                    <h3 class="font-bold text-blue-900 text-[14px]">Adelantos y Transacciones de Pago</h3>
                                    <p class="text-[12px] text-blue-700 mt-0.5">Deuda Pendiente: <span class="font-black text-rose-500 bg-white px-2 rounded ml-1 border border-rose-100">S/ ${formatMoney(v.saldo_pendiente||0)}</span></p>
                                </div>
                                ${v.saldo_pendiente > 0 && v.estado !== 'ANULADO' ? `
                                <button onclick="registrarAdelanto('${v.id}', ${v.saldo_pendiente||0})" class="bg-blue-600 hover:bg-blue-700 text-white text-[11px] font-bold py-1.5 px-3 rounded-lg shadow transition-colors flex items-center">
                                    <i class="fas fa-plus mr-1.5"></i> Ingresar Pago
                                </button>
                                ` : (v.saldo_pendiente <= 0 ? `<div class="bg-gradient-to-r from-emerald-50 to-emerald-100 text-emerald-800 text-xs font-bold px-3 py-1.5 rounded border border-emerald-200 shadow-sm"><i class="fas fa-check-double mr-1 text-emerald-600"></i> DEUDA SALDADA</div>` : '')}
                            </div>
                            <div class="bg-white rounded border border-blue-100 overflow-hidden px-4">
                                ${rowsPagos || '<div class="py-4 text-center text-xs text-blue-400 font-medium">Ningún pago registrado todavía.</div>'}
                            </div>
                        </div>
                    `;
                }

                Swal.fire({
                    title: '<span class="text-xl">Detalle de Transacción</span>',
                    html: theHtml,
                    width: 700,
                    showCloseButton: true,
                    showConfirmButton: false,
                    customClass: { popup: 'modal-details' }
                });

            } catch(e) { console.error(e); Swal.fire('Error', 'No se pudo cargar el detalle.', 'error'); }
        }

        // ==========================================
        //  REGISTRO DINÁMICO DE ADELANTOS (CRÉDITO)
        // ==========================================
        async function registrarAdelanto(ventaId, saldoActual) {
            // Close the current modal temporarily to show the input form to avoid Z-index overlaps
            Swal.close();

            const { value: formValues } = await Swal.fire({
                title: 'Ingreso de Efectivo / Amortización',
                html: `
                    <div class="text-left mb-4 bg-gray-50 p-3 rounded text-sm text-gray-700 border text-center font-medium">
                        Deuda Máxima: <b class="text-rose-500 ml-1">S/ ${formatMoney(saldoActual)}</b>
                    </div>
                    <div class="flex flex-col gap-4 text-left">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">Monto a pagar (S/)</label>
                            <input id="swal-monto" type="number" step="0.01" class="w-full border-2 border-blue-200 border-gray-300 rounded px-3 py-2 focus:border-blue-500 outline-none text-lg text-blue-600 font-bold" placeholder="0.00" value="${saldoActual}">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">Etiqueta Financiera del Pago</label>
                            <select id="swal-tipo" class="w-full border border-gray-300 rounded px-3 py-2 bg-white outline-none">
                                <option value="ADELANTO">ADELANTO / PAGO ANTICIPADO</option>
                                <option value="PAGO DE CUOTA PROGRAMADA">PAGO DE CUOTA PROGRAMADA</option>
                                <option value="PAGO ESPONTÁNEO DEL CLIENTE">PAGO ESPONTÁNEO DEL CLIENTE</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">Método de Pago</label>
                            <select id="swal-metodo" class="w-full border border-gray-300 rounded px-3 py-2 bg-white outline-none">
                                <option value="EFECTIVO">Efectivo en Caja</option>
                                <option value="TRANSFERENCIA">Transferencia / Yape / Plin</option>
                                <option value="TARJETA">Tarjeta (POS Físico)</option>
                                <option value="BANCO">Depósito Bancario Diferido</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">Referencia / Trazabilidad (Opcional)</label>
                            <input id="swal-ref" type="text" class="w-full border border-gray-300 rounded px-3 py-2 outline-none" placeholder="N° Op. Voucher o Notas de turno">
                        </div>
                    </div>
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonColor: '#2563eb',
                confirmButtonText: '<i class="fas fa-save mr-1"></i> Asentar Pago',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    const monto = parseFloat(document.getElementById('swal-monto').value);
                    if (isNaN(monto) || monto <= 0 || monto > saldoActual) {
                        Swal.showValidationMessage(`El monto debe ser numérico, mayor a 0 y no exceder la deuda de S/ ${saldoActual}`);
                        return false;
                    }
                    return {
                        monto: monto,
                        metodo: document.getElementById('swal-metodo').value,
                        ref: document.getElementById('swal-ref').value,
                        tipo_pago: document.getElementById('swal-tipo').value || 'ADELANTO'
                    }
                }
            });

            if (formValues) {
                Swal.fire({ title: 'Asentando Pago...', allowOutsideClick: false, didOpen:()=>{Swal.showLoading()} });
                try {
                    const nuevoSaldo = Number(saldoActual) - formValues.monto;
                    const fechaHoyStr = new Date().toISOString();
                    const userInfo = window.currentUser?.email || window.currentUser?.id || 'Desconocido';
                    
                    // 1. Insertar el pago (Adenda dinámica)
                    const payloadPago = {
                        empresa_id: currentEmpresaId,
                        venta_id: ventaId,
                        tipo_pago: formValues.tipo_pago, // Término comercial dinámico pivotado por el user
                        monto: formValues.monto.toFixed(2),
                        fecha_pago: fechaHoyStr,
                        estado: 'PAGADO',
                        metodo_pago: formValues.metodo,
                        referencia_pago: formValues.ref,
                        observaciones: 'Adelanto CUS/CUP introducido manualmente por modal posterior.',
                        created_by: userInfo
                    };
                    const { error: errIni } = await window.supabaseClient.from('ventas_credito_pagos').insert([payloadPago]);
                    if (errIni) throw errIni;

                    // 2. Actualizar el saldo restante en la cabecera
                    const { error: errVta } = await window.supabaseClient.from('ventas').update({saldo_pendiente: nuevoSaldo}).eq('id', ventaId);
                    if (errVta) throw errVta;

                    Swal.fire('¡Cobro Exitoso!', 'El adelanto ha impactado la deuda correctamente.', 'success').then(()=>{
                        cargarVentashistoricas(); // Refresca lista base
                        verDetalle(ventaId); // Retorna al usuario al modal para que vea su nuevo saldo
                    });

                } catch (er) {
                    console.error(er);
                    Swal.fire('Error Critico', 'Transacción de cobro fallida. Revisa consola.', 'error').then(()=>{ verDetalle(ventaId); });
                }
            } else {
                verDetalle(ventaId); // Si canceló, volvemos a abrir el modal
            }
        }

        // ==========================================
        //  SAFE APPEND PRO & ANULACIÓN
        // ==========================================
        const getLimaDate = () => {
            const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc - 5 * 3600000).toISOString().split('T')[0];
        };

        async function anularVenta(ventaId) {
            // Fetch venta details needed for Safe Append PRO
            const { data: venta, error: fetchError } = await window.supabaseClient.from('ventas')
                .select('numero_ticket, fecha_venta')
                .eq('id', ventaId)
                .single();
            if (fetchError) {
                console.error("Error fetching venta details for anulation:", fetchError);
                Swal.fire('Error', 'No se pudo obtener los detalles de la venta para anular.', 'error');
                return;
            }
            const { numero_ticket, fecha_venta } = venta;

            // 1. Advertencia de Negocio
            const result = await Swal.fire({
                title: '¿Anular Ticket?',
                text: `Esta acción invalidará la venta financiera. Si se entregaron productos físicos (ítems), también se intentará restaurar el Kardex del almacén mediante el motor Safe Append PRO.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Sí, anular',
                cancelButtonText: 'Cancelar'
            });

            if(!result.isConfirmed) return;

            Swal.fire({ title: 'Analizando Kardex...', allowOutsideClick: false, didOpen:()=>{Swal.showLoading()} });

            try {
                // 2. Extraer Items Físicos involucrados en este ticket
                const { data: detallesVenta } = await window.supabaseClient.from('ventas_detalle').select('tipo_item_vendido, referencia_id').eq('venta_id', ventaId);
                const itemsFisicosIds = detallesVenta.filter(d => d.tipo_item_vendido === 'ITEMS').map(d => d.referencia_id);

                let egresoBD_id = null;

                // 3. Validar Reglas de Corrección de Inventario (Safe Append PRO)
                if(itemsFisicosIds.length > 0) {
                    
                    // Comprobar si hay movimientos KARDEX en el futuro a la venta
                    const fechaBase = new Date(fecha_venta + 'T00:00:00'); 
                    fechaBase.setDate(fechaBase.getDate() + 1);
                    const nextDayUTC = `${fechaBase.getFullYear()}-${String(fechaBase.getMonth()+1).padStart(2,'0')}-${String(fechaBase.getDate()).padStart(2,'0')}T05:00:00Z`;

                    // Para buscar el egreso asociado físicamente a esta venta, buscamos en observaciones:
                    const trazabilidad = `VENTA_REF:${numero_ticket}`;
                    const { data: egresoAsociado } = await window.supabaseClient.from('egresos')
                        .select('id, almacen_origen_id')
                        .eq('observaciones', trazabilidad)
                        .single();

                    if(egresoAsociado) {
                        egresoBD_id = egresoAsociado.id;
                        
                        const { data: conflictos } = await window.supabaseClient.from('kardex')
                            .select('id')
                            .eq('almacen_id', egresoAsociado.almacen_origen_id)
                            .in('item_id', itemsFisicosIds)
                            .gte('fecha_movimiento', nextDayUTC)
                            .limit(1);

                        if(conflictos && conflictos.length > 0) {
                            throw new Error(`BLOQUEO SAFE APPEND PRO: No se puede anular esta venta porque los ítems físicos involucrados tienen movimientos de inventario en fechas posteriores.`);
                        }
                    } else {
                        console.warn("Fallo leve logístico: No se encontró un egreso físico que diga", trazabilidad, "pero sí había ITEMS vendidos. Posiblemente venta antigua.");
                    }
                }

                // 4. TRANSACCIÓN DB (A. Anular Venta Financiera)
                const { error: err1 } = await window.supabaseClient.from('ventas').update({ 
                    estado: 'ANULADO', 
                    anulado_by: window.currentUser.email 
                }).eq('id', ventaId);
                
                if(err1) throw err1;

                // 5. TRANSACCION DB (B. Revertir Kardex Físico vía RPC existente, sí existe un egreso asociado y es seguro)
                if(egresoBD_id) {
                    // El RPC `fn_administrar_correccion_egreso` restaurará las cantidades a los lotes exactos y borrará Kardex/Egresos "silenciosamente" salvaguardando la integridad
                    const { data: rpcData, error: errRpc } = await window.supabaseClient.rpc('fn_administrar_correccion_egreso', {
                        p_egreso_id: egresoBD_id,
                        p_accion: 'ELIMINAR'
                    });
                    
                    if(errRpc) throw errRpc;
                    if(rpcData && !rpcData.success) throw new Error("Fallo revertiendo Kardex: " + rpcData.message);
                }

                Swal.fire('¡Anulado!', 'El ticket ha sido marcado como ANULADO y su impacto logístico (si hubo) fue restaurado.', 'success').then(() => {
                    cargarVentashistoricas();
                });

            } catch(e) {
                console.error(e);
                Swal.fire('No se pudo anular', e.message, 'error');
            }
        }

        async function promptReimprimir() {
            const { value: num } = await Swal.fire({
                title: 'Reimprimir Ticket',
                input: 'text',
                inputLabel: 'Ingrese el N° de Ticket (Ej. TCK-123456)',
                inputPlaceholder: 'TCK-000000',
                showCancelButton: true
            });
            if(num) {
                Swal.fire({ title: 'Buscando...', allowOutsideClick: false, didOpen:()=>{Swal.showLoading()} });
                const { data: b, error } = await window.supabaseClient.from('ventas').select('id')
                    .eq('empresa_id', currentEmpresaId)
                    .ilike('numero_ticket', `%${num}%`).limit(1).single();
                if(b) {
                    Swal.close();
                    imprimirTicketCerrado(b.id);
                }
                else {
                    Swal.fire('Error', 'Ticket no encontrado en esta empresa.', 'error');
                }
            }
        }

    </script>
